<html>

<head>
    <title>Theme change</title>
    <script>
        function onClickRed() {
            document.body.style.backgroundColor = "red";
        }
        function onClickBlue() {
            document.body.style.backgroundColor = "blue";
        }
        function onClickGreen() {
            document.body.style.backgroundColor = "green";
        }
    </script>
</head>

<body>
    <h1>Theme Color </h1>
    <button id="btnRed" onclick="onClickRed()" style="background-color: red;color:white;border-radius: 30px; ">Red</button>
    <button id="btnBlue" onclick="onClickBlue()" style="background-color: blue;color: rgb(252, 246, 246);border-radius: 30px;">Blue</button>
    <button id="btnGreen" onclick="onClickGreen()" style="background-color: green;color: rgb(255, 254, 254);border-radius: 30px;">Green</button>
</body>

</html>
