<!DOCTYPE html>
<html>

<head>
    <title>Dynamic</title>
    <link rel="stylesheet" href="Dynamic.css">
    <script>
        function onClickCSSAdd() {
            debugger;
            document.getElementById("divDynamic").classList.add("div-border");
            document.getElementById("lblEnterDetails").style.border = "Dotted";
        }

        function onClickCSSRemove() {
            debugger;
            document.getElementById("divDynamic").classList.remove("div-border");
        }
        function onclickCSSToggle() {
            debugger;
            document.getElementById("divDynamic").classList.toggle("div-border");
        }
        
    </script>
</head>

<body>
    <div id="divDynamic">
        <h1 id="h1Practice">Practice</h1>
        <p id="pDownload">You can download thousands of royalty-free Form and Form Filling 4K stock videos from trusted
            providers like Pixabay and Pexels.</p>
        <label id="lblEnterDetails">Enter Details</label>
        <input id="checkboxMale" type="checkbox">Male
        <input id="checkbox" type="checkbox">Female<br>
        <button id="btnCSSAdd" onclick="onClickCSSAdd()">CSS ADD</button>
        <button id="btnCSSRemove" onclick="onClickCSSRemove()">CSS Remove</button>
        <button id="btnCSSToggle" onclick="onclickCSSToggle()">CSS Toggle</button>
    </div>
</body>

</html>
