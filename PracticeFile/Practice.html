<!DOCTYPE html>
<html>
    <head>
        <title>PracticeTheme</title>
        <script>
            function onClickBlue(){
                debugger;
                document.body.style.backgroundColor ="Blue";
            }
            function onClickRed(){
                debugger;
                document.body.style.backgroundColor ="Red";
            }
            function onClickBlack(){
                debugger;
                document.body.style.backgroundColor ="Black";
            }
        </script>
    </head>
    <body>
        <h1>Theme Color</h1>
        <button id="btnBlue" onclick="onClickBlue()" style="background-color: blue; color: aliceblue;">Blue</button>
        <button id="btnRed" onclick="onClickRed()" style="background-color: red; color: antiquewhite;">Red</button>
        <button id="btnBlack" onclick="onClickBlack()" style="background-color: black; color: antiquewhite;">Black</button><br>
    </body>
</html>
